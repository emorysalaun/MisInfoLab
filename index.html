<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>misinfo-lab</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
      
      <nav class ="navbar">
        <p class = "navbar-title">MisInfoLab</p>
        <button class="nav-btn" data-page="home">Home</button>
        <button class="nav-btn" data-page="learn">Learn</button>
        <button class="nav-btn" data-page="test">Test</button>
      </nav>

      <div class="generator-container">

        <button class="top-btn">Choose Random Story</button>

        <input 
          type="text" 
          id="headline-input" 
          class="headline-input"
          placeholder="Enter your topic / headline here…"
        />

        <div class="button-grid">
          <button class="gen-btn">Clickbait</button>
          <button class="gen-btn">Emotional Triggering</button>
          <button class="gen-btn">Fake Facts</button>
          <button class="gen-btn">Political Bias</button>
          <button class="gen-btn">Randomize</button>
        </div>

      </div>

      <div id="explanation-screen" class="hidden explanation-container">
        <button id="back-btn" class="back-btn">Back</button>
        <div class="headline-row">
          <div class="headline-box">
            <h2>Original Headline</h2>
            <p id="original-headline-text" class="headline-text"></p>
          </div>
      
          <div class="headline-box">
            <h2>Misinfo Headline (Model: <code>llama-3.1-8b-instant</code>)</h2>
            <p id="misinfo-headline-text" class="headline-text"></p>
          </div>
        </div>
      
        <div class="explanation-box">
          <h3>Explanation (Model: <code>llama-3.1-8b-instant</code>)</h3>
          <p id="explanation-text"></p>
        </div>

        <div id="detection-results" class="explanation-box"></div>

      

      
      </div>      


      <script type="module" src="/src/main.ts"></script>
  </body>
</html>
