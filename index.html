<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>misinfo-lab</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
      
      <nav class ="navbar">
        <p class = "navbar-title">MisInfoLab</p>
        <button class="nav-btn" data-page="home">Home</button>
        <button class="nav-btn" data-page="learn">Learn</button>
        <button class="nav-btn" data-page="test">Test</button>
      </nav>

      <div class="generator-container">

        <button class="top-btn">Choose Random Story</button>

        <input 
          type="text" 
          id="headline-input" 
          class="headline-input"
          placeholder="Enter your topic / headline here…"
        />

        <div class="button-grid">
          <button class="gen-btn">Clickbait</button>
          <button class="gen-btn">Emotional Triggering</button>
          <button class="gen-btn">Fake Facts</button>
          <button class="gen-btn">Political Bias</button>
          <button class="gen-btn">Randomize</button>
        </div>

      </div>

      <div id="explanation-screen" class="hidden explanation-container">
        <button id="back-btn" class="back-btn">Back</button>
        <div class="headline-row">
          <div class="headline-box">
            <h2>Original Headline</h2>
            <p id="original-headline-text" class="headline-text"></p>
          </div>
      
          <div class="headline-box">
            <h2>Misinfo Headline (Model: <code>llama-3.1-8b-instant</code>)</h2>
            <p id="misinfo-headline-text" class="headline-text"></p>
          </div>
        </div>
      
        <div class="explanation-box">
          <h3>Explanation (Model: <code>llama-3.1-8b-instant</code>)</h3>
          <p id="explanation-text"></p>
        </div>

        <div id="detection-results" class="explanation-box"></div>

        <div class="story-box">
          <button id="generate-story-btn" class="wide-btn">
            Generate Full Story (AI Model: llama-3.1-8b-instant)
          </button>
          <p id="generated-story-text" class="story-output"></p>
        </div>
      

      
      </div>    
      
      <div id="learn-screen" class="hidden explanation-container">
        <div class="learn-wrapper">

          <h1 class="learn-title">Misinformation Techniques</h1>
        
          <div id="learn-cards"></div>
        
        </div>        
      </div>
      
      <div id="test-screen" class="hidden explanation-container">
        <h1>Misinformation Test</h1>

        <button id="start-test-btn" class="start-btn">Start Test</button>
      
        <div id="test-question-box" class="hidden test-card">
          <p id="test-headline" class="test-headline"></p>
      
          <div id="test-choices"></div>
      
          <button id="next-question-btn" class="start-btn hidden">Next</button>
        </div>
      
        <div id="test-results" class="hidden">
          <h2>Your Results</h2>
          <p id="test-score"></p>
          <p id="test-summary"></p>
          <button id="restart-test-btn" class="start-btn">Restart Test</button>
        </div>
      </div>
      


      <script type="module" src="/src/main.ts"></script>
  </body>
</html>
